<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack Pro | Internship Task</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo"><i class="fas fa-heartbeat"></i> FitTrack</div>
            <nav>
                <div class="nav-item active"><i class="fas fa-chart-line"></i> Dashboard</div>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h2>Fitness Dashboard</h2>
                <button id="clearData" class="btn-danger">Reset All Records</button>
            </header>

            <div class="grid-container">
                <div class="card form-card">
                    <h3><i class="fas fa-plus-circle"></i> Log Daily Activity</h3>
                    <div class="input-group">
                        <label>Steps Walked</label>
                        <input type="number" id="stepsInput" placeholder="Enter steps">
                    </div>
                    <div class="input-group">
                        <label>Workout (Minutes)</label>
                        <input type="number" id="workoutInput" placeholder="Enter minutes">
                    </div>
                    <button id="saveEntryBtn" class="btn-primary">Save Record</button>
                </div>

                <div class="card chart-card">
                    <h3><i class="fas fa-fire"></i> Weekly Progress Trend</h3>
                    <canvas id="progressChart"></canvas>
                </div>
            </div>

            <div class="card history-card">
                <h3><i class="fas fa-list"></i> Activity History (Saved Records)</h3>
                <div class="table-wrapper">
                    <table id="historyTable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Steps</th>
                                <th>Workout</th>
                                <th>Calories (Est.)</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
