<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Inspiration App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="quote-container">
        <h1>Quote of the Day</h1>

        <div class="category-container">
            <button class="cat-btn active" onclick="filterQuotes('all')">All</button>
            <button class="cat-btn" onclick="filterQuotes('motivational')">Motivational</button>
            <button class="cat-btn" onclick="filterQuotes('wisdom')">Wisdom</button>
        </div>
        
        <div class="quote-box">
            <i class="fas fa-quote-left"></i>
            <p id="quote-text" class="fade-in">"Press the button to get inspired."</p>
            <span id="author">- Your App</span>
        </div>

        <button id="new-quote-btn">NEW QUOTE</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
